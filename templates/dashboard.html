{% extends 'base.html' %}

{% block content %}

<div class="container">

    <h2>👋 Welcome {{ name }}</h2>

    <!-- ADD TASK -->
    <form method="POST" action="/add_task">
        <input type="text" name="task" placeholder="Add new task...">
        <button>Add Task</button>
    </form>

    <!-- TASK LIST -->
    <ul>
        {% for task in tasks %}
        <li>
            <span class="{% if task.done %}done{% endif %}">
                {{ task.task }}
            </span>

            <div class="actions">
                <a href="/complete/{{ task.id }}">✔️</a>
                <a href="/delete/{{ task.id }}">❌</a>
            </div>
        </li>
        {% endfor %}
    </ul>

    <br>
    <a href="/logout">Logout</a>

</div>

{% endblock %}
